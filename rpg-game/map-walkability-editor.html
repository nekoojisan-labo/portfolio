<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Walkability Editor</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #111827;
            --panel: #172033;
            --panel-2: #0e1626;
            --line: #2e4b73;
            --text: #edf7ff;
            --muted: #9fb5cc;
            --cyan: #35d9ff;
            --red: #ff5a7a;
            --green: #82f6a2;
            --yellow: #ffe66d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        button,
        select,
        textarea,
        input {
            font: inherit;
        }

        button,
        select {
            border: 1px solid var(--line);
            background: #10243b;
            color: var(--text);
            border-radius: 6px;
            min-height: 34px;
            padding: 0 10px;
        }

        button {
            cursor: pointer;
        }

        button:hover,
        select:hover {
            border-color: var(--cyan);
        }

        button.active {
            background: #0c5574;
            border-color: var(--cyan);
            color: #ffffff;
        }

        .app {
            display: grid;
            grid-template-rows: auto 1fr;
            min-height: 100vh;
        }

        .topbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--line);
            background: #0d1524;
            flex-wrap: wrap;
        }

        .title {
            font-weight: 700;
            margin-right: 8px;
        }

        .segmented {
            display: inline-flex;
            gap: 6px;
            align-items: center;
        }

        .main {
            display: grid;
            grid-template-columns: minmax(820px, 1fr) 360px;
            gap: 14px;
            padding: 14px;
        }

        .canvas-wrap {
            min-width: 0;
        }

        .canvas-shell {
            width: min(100%, 1120px);
            overflow: auto;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel-2);
        }

        canvas {
            display: block;
            width: 800px;
            height: 450px;
            image-rendering: auto;
            cursor: crosshair;
        }

        .side {
            min-width: 0;
            display: grid;
            grid-template-rows: auto auto 1fr;
            gap: 12px;
        }

        .panel {
            border: 1px solid var(--line);
            background: var(--panel);
            border-radius: 8px;
            padding: 12px;
        }

        .panel h2 {
            margin: 0 0 10px;
            font-size: 15px;
        }

        .row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            color: var(--muted);
            font-size: 13px;
        }

        .stat-value {
            color: var(--text);
            font-weight: 700;
        }

        textarea {
            width: 100%;
            min-height: 270px;
            resize: vertical;
            border: 1px solid var(--line);
            background: #07101d;
            color: var(--text);
            border-radius: 6px;
            padding: 10px;
            line-height: 1.4;
            tab-size: 2;
        }

        .hint {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.6;
        }

        .legend {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            color: var(--muted);
            font-size: 12px;
        }

        .legend span::before {
            content: "";
            display: inline-block;
            width: 10px;
            height: 10px;
            margin-right: 5px;
            border-radius: 2px;
            vertical-align: -1px;
        }

        .walk::before {
            background: rgba(53, 217, 255, 0.75);
        }

        .collision::before {
            background: rgba(255, 90, 122, 0.75);
        }

        .exit::before {
            background: rgba(130, 246, 162, 0.75);
        }

        @media (max-width: 1180px) {
            .main {
                grid-template-columns: 1fr;
            }

            .side {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="title">可動域エディタ</div>
            <select id="mapSelect" aria-label="Map"></select>
            <div class="segmented" aria-label="Layer">
                <button id="walkMode" class="active" type="button">歩行</button>
                <button id="collisionMode" type="button">障害物</button>
            </div>
            <button id="deleteSelected" type="button">選択削除</button>
            <button id="undo" type="button">最後を削除</button>
            <button id="clearLayer" type="button">レイヤー消去</button>
            <button id="savePreview" type="button">ゲームに一時反映</button>
            <button id="openGame" type="button">ゲームを開く</button>
            <button id="resetPreview" type="button">一時反映を解除</button>
        </header>

        <main class="main">
            <section class="canvas-wrap" aria-label="Editor canvas">
                <div class="canvas-shell">
                    <canvas id="canvas" width="800" height="450"></canvas>
                </div>
            </section>

            <aside class="side">
                <section class="panel">
                    <h2>状態</h2>
                    <div class="stats">
                        <div>歩行: <span id="walkCount" class="stat-value">0</span></div>
                        <div>障害物: <span id="collisionCount" class="stat-value">0</span></div>
                        <div>選択: <span id="selectedInfo" class="stat-value">なし</span></div>
                        <div>座標: <span id="pointerInfo" class="stat-value">-</span></div>
                    </div>
                    <div class="legend" style="margin-top: 10px;">
                        <span class="walk">歩行</span>
                        <span class="collision">障害物</span>
                        <span class="exit">出口</span>
                    </div>
                </section>

                <section class="panel">
                    <h2>操作</h2>
                    <div class="hint">
                        ドラッグで矩形を追加。既存の矩形をクリックで選択、ドラッグで移動。出口は確認用の表示です。
                    </div>
                </section>

                <section class="panel">
                    <h2>出力</h2>
                    <textarea id="output" spellcheck="false"></textarea>
                </section>
            </aside>
        </main>
    </div>

    <script src="map-system.js"></script>
    <script>
        const STORAGE_KEY = 'deusCodeWalkabilityOverrides';
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const mapSelect = document.getElementById('mapSelect');
        const output = document.getElementById('output');
        const walkMode = document.getElementById('walkMode');
        const collisionMode = document.getElementById('collisionMode');
        const walkCount = document.getElementById('walkCount');
        const collisionCount = document.getElementById('collisionCount');
        const selectedInfo = document.getElementById('selectedInfo');
        const pointerInfo = document.getElementById('pointerInfo');

        const mapSystem = new MapSystem();
        const mapImages = new Map();
        const mapIds = Object.keys(mapSystem.maps)
            .filter(id => mapSystem.maps[id].image)
            .sort((a, b) => a.localeCompare(b));
        const state = {
            layer: 'walkableRects',
            mapId: mapIds.includes('shinjuku_center_plaza') ? 'shinjuku_center_plaza' : mapIds[0],
            selectedLayer: null,
            selectedIndex: -1,
            dragging: false,
            moving: false,
            startX: 0,
            startY: 0,
            moveOffsetX: 0,
            moveOffsetY: 0,
            draftRect: null,
            data: loadInitialData()
        };

        mapIds.forEach(id => {
            const option = document.createElement('option');
            option.value = id;
            option.textContent = `${id} / ${mapSystem.maps[id].name || 'No name'}`;
            mapSelect.appendChild(option);
        });
        mapSelect.value = state.mapId;

        function loadInitialData() {
            const saved = readStoredOverrides();
            const data = {};
            mapIds.forEach(id => {
                if (saved[id]) {
                    data[id] = normalizeMapData(saved[id]);
                    return;
                }
                const map = mapSystem.maps[id];
                const scale = map.worldScale || 1;
                data[id] = {
                    walkableRects: (map.walkableRects || []).map(rect => toBaseRect(rect, scale)),
                    collisionRects: (map.buildings || [])
                        .filter(rect => rect.collisionOnly || rect.type === 'collision')
                        .map(rect => toBaseRect(rect, scale))
                };
            });
            return data;
        }

        function readStoredOverrides() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            } catch {
                return {};
            }
        }

        function normalizeMapData(data) {
            return {
                walkableRects: sanitizeRects(data.walkableRects),
                collisionRects: sanitizeRects(data.collisionRects)
            };
        }

        function sanitizeRects(rects) {
            if (!Array.isArray(rects)) return [];
            return rects
                .map(rect => ({
                    x: Math.round(Number(rect.x)),
                    y: Math.round(Number(rect.y)),
                    width: Math.round(Number(rect.width)),
                    height: Math.round(Number(rect.height))
                }))
                .filter(rect => Number.isFinite(rect.x) &&
                    Number.isFinite(rect.y) &&
                    Number.isFinite(rect.width) &&
                    Number.isFinite(rect.height) &&
                    rect.width > 0 &&
                    rect.height > 0);
        }

        function toBaseRect(rect, scale) {
            return {
                x: Math.round(rect.x / scale),
                y: Math.round(rect.y / scale),
                width: Math.round(rect.width / scale),
                height: Math.round(rect.height / scale)
            };
        }

        function currentData() {
            if (!state.data[state.mapId]) {
                state.data[state.mapId] = { walkableRects: [], collisionRects: [] };
            }
            return state.data[state.mapId];
        }

        function setLayer(layer) {
            state.layer = layer;
            walkMode.classList.toggle('active', layer === 'walkableRects');
            collisionMode.classList.toggle('active', layer === 'collisionRects');
            state.selectedLayer = null;
            state.selectedIndex = -1;
            draw();
            updateOutput();
        }

        function loadImage(mapId) {
            if (mapImages.has(mapId)) return mapImages.get(mapId);
            const image = new Image();
            image.src = mapSystem.maps[mapId].image;
            image.onload = draw;
            mapImages.set(mapId, image);
            return image;
        }

        function getPointer(event) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: Math.max(0, Math.min(canvas.width, Math.round((event.clientX - rect.left) * scaleX))),
                y: Math.max(0, Math.min(canvas.height, Math.round((event.clientY - rect.top) * scaleY)))
            };
        }

        function makeRect(x1, y1, x2, y2) {
            return {
                x: Math.min(x1, x2),
                y: Math.min(y1, y2),
                width: Math.abs(x2 - x1),
                height: Math.abs(y2 - y1)
            };
        }

        function hitTest(point) {
            const data = currentData();
            const layers = ['collisionRects', 'walkableRects'];
            for (const layer of layers) {
                const rects = data[layer];
                for (let i = rects.length - 1; i >= 0; i--) {
                    const rect = rects[i];
                    if (
                        point.x >= rect.x &&
                        point.x <= rect.x + rect.width &&
                        point.y >= rect.y &&
                        point.y <= rect.y + rect.height
                    ) {
                        return { layer, index: i, rect };
                    }
                }
            }
            return null;
        }

        function draw() {
            const map = mapSystem.maps[state.mapId];
            const image = loadImage(state.mapId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#07101d';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (image.complete && image.naturalWidth > 0) {
                ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
            }

            drawGrid();
            const data = currentData();
            drawRects(data.walkableRects, 'rgba(53, 217, 255, 0.26)', '#35d9ff', 'walkableRects');
            drawRects(data.collisionRects, 'rgba(255, 90, 122, 0.32)', '#ff5a7a', 'collisionRects');
            drawExits(map.exits || [], map.worldScale || 1);

            if (state.draftRect) {
                drawOneRect(state.draftRect, 'rgba(255, 230, 109, 0.28)', '#ffe66d', true);
            }
        }

        function drawGrid() {
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= canvas.width; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += 50) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawRects(rects, fill, stroke, layer) {
            rects.forEach((rect, index) => {
                const selected = state.selectedLayer === layer && state.selectedIndex === index;
                drawOneRect(rect, fill, selected ? '#ffffff' : stroke, selected);
            });
        }

        function drawOneRect(rect, fill, stroke, selected) {
            ctx.save();
            ctx.fillStyle = fill;
            ctx.strokeStyle = stroke;
            ctx.lineWidth = selected ? 3 : 2;
            ctx.fillRect(rect.x, rect.y, rect.width, rect.height);
            ctx.strokeRect(rect.x + 0.5, rect.y + 0.5, rect.width, rect.height);
            ctx.restore();
        }

        function drawExits(exits, scale) {
            exits.forEach(exit => {
                const rect = toBaseRect(exit, scale);
                drawOneRect(rect, 'rgba(130, 246, 162, 0.2)', '#82f6a2', false);
            });
        }

        function updateOutput() {
            const data = normalizeMapData(currentData());
            walkCount.textContent = data.walkableRects.length;
            collisionCount.textContent = data.collisionRects.length;

            if (state.selectedLayer && state.selectedIndex >= 0) {
                const selected = currentData()[state.selectedLayer][state.selectedIndex];
                selectedInfo.textContent = selected
                    ? `${state.selectedLayer === 'walkableRects' ? '歩行' : '障害物'} #${state.selectedIndex + 1}`
                    : 'なし';
            } else {
                selectedInfo.textContent = 'なし';
            }

            const payload = {
                [state.mapId]: data
            };
            output.value = JSON.stringify(payload, null, 2);
        }

        canvas.addEventListener('pointerdown', event => {
            const point = getPointer(event);
            const hit = hitTest(point);
            state.dragging = true;
            state.startX = point.x;
            state.startY = point.y;
            state.draftRect = null;

            if (hit) {
                state.selectedLayer = hit.layer;
                state.selectedIndex = hit.index;
                state.moving = true;
                state.moveOffsetX = point.x - hit.rect.x;
                state.moveOffsetY = point.y - hit.rect.y;
            } else {
                state.selectedLayer = null;
                state.selectedIndex = -1;
                state.moving = false;
            }
            canvas.setPointerCapture(event.pointerId);
            draw();
            updateOutput();
        });

        canvas.addEventListener('pointermove', event => {
            const point = getPointer(event);
            pointerInfo.textContent = `${point.x}, ${point.y}`;

            if (!state.dragging) return;

            if (state.moving && state.selectedLayer && state.selectedIndex >= 0) {
                const rect = currentData()[state.selectedLayer][state.selectedIndex];
                rect.x = Math.max(0, Math.min(canvas.width - rect.width, point.x - state.moveOffsetX));
                rect.y = Math.max(0, Math.min(canvas.height - rect.height, point.y - state.moveOffsetY));
            } else {
                state.draftRect = makeRect(state.startX, state.startY, point.x, point.y);
            }
            draw();
            updateOutput();
        });

        canvas.addEventListener('pointerup', event => {
            if (state.dragging && !state.moving && state.draftRect) {
                const rect = {
                    x: Math.round(state.draftRect.x),
                    y: Math.round(state.draftRect.y),
                    width: Math.round(state.draftRect.width),
                    height: Math.round(state.draftRect.height)
                };
                if (rect.width >= 8 && rect.height >= 8) {
                    const rects = currentData()[state.layer];
                    rects.push(rect);
                    state.selectedLayer = state.layer;
                    state.selectedIndex = rects.length - 1;
                }
            }

            state.dragging = false;
            state.moving = false;
            state.draftRect = null;
            canvas.releasePointerCapture(event.pointerId);
            draw();
            updateOutput();
        });

        canvas.addEventListener('pointerleave', () => {
            pointerInfo.textContent = '-';
        });

        mapSelect.addEventListener('change', () => {
            state.mapId = mapSelect.value;
            state.selectedLayer = null;
            state.selectedIndex = -1;
            draw();
            updateOutput();
        });

        walkMode.addEventListener('click', () => setLayer('walkableRects'));
        collisionMode.addEventListener('click', () => setLayer('collisionRects'));

        document.getElementById('deleteSelected').addEventListener('click', () => {
            if (!state.selectedLayer || state.selectedIndex < 0) return;
            currentData()[state.selectedLayer].splice(state.selectedIndex, 1);
            state.selectedLayer = null;
            state.selectedIndex = -1;
            draw();
            updateOutput();
        });

        document.getElementById('undo').addEventListener('click', () => {
            const rects = currentData()[state.layer];
            rects.pop();
            state.selectedLayer = null;
            state.selectedIndex = -1;
            draw();
            updateOutput();
        });

        document.getElementById('clearLayer').addEventListener('click', () => {
            currentData()[state.layer] = [];
            state.selectedLayer = null;
            state.selectedIndex = -1;
            draw();
            updateOutput();
        });

        document.getElementById('savePreview').addEventListener('click', () => {
            const saved = readStoredOverrides();
            saved[state.mapId] = normalizeMapData(currentData());
            localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
            updateOutput();
        });

        document.getElementById('openGame').addEventListener('click', () => {
            window.open(`index.html?walkabilityPreview=1&v=walkability-${Date.now()}`, '_blank');
        });

        document.getElementById('resetPreview').addEventListener('click', () => {
            const saved = readStoredOverrides();
            delete saved[state.mapId];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
        });

        draw();
        updateOutput();
    </script>
</body>
</html>
