<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>かわいいおみくじ</title>
  <link rel="preload" href="./assets/generated/shrine-bg.png" as="image">
  <link rel="preload" href="./assets/generated/omikuji-paper.png" as="image">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app" aria-live="polite">
    <a class="back-button" href="../index.html">ポートフォリオに戻る</a>

    <section id="main-screen" class="screen active" aria-labelledby="app-title">
      <div class="intro">
        <p class="eyebrow">神前御籤</p>
        <h1 id="app-title">かわいいおみくじ</h1>
        <p class="subtitle">今日の運勢を、静かに一枚。</p>
      </div>

      <div class="draw-stage">
        <div class="paper-preview" aria-hidden="true">
          <img src="./assets/generated/omikuji-paper.png" alt="">
          <span>御神籤</span>
        </div>
        <button id="draw-button" class="draw-button" type="button">
          おみくじを引く
        </button>
      </div>
    </section>

    <section id="loading-screen" class="screen loading-screen" aria-label="抽選中">
      <div class="ritual-loader" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <p>御神籤を結んでいます...</p>
    </section>

    <section id="result-screen" class="screen result-screen" aria-labelledby="fortune-name">
      <div class="result-toolbar">
        <p id="fortune-name" class="fortune-name"></p>
        <p id="pattern-label" class="pattern-label"></p>
      </div>

      <figure class="fortune-sheet">
        <img id="fortune-image" alt="おみくじの結果">
      </figure>

      <div id="result-text" class="visually-hidden"></div>

      <button id="retry-button" class="retry-button" type="button">
        もう一度引く
      </button>
    </section>
  </main>

  <script src="./data/fortune-data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
